<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrthoBuddy — Nouveau mot de passe</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',Arial,sans-serif;background:#F4F6F3;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{background:white;border-radius:16px;padding:40px 48px;box-shadow:0 4px 24px rgba(0,0,0,.10);width:100%;max-width:360px;text-align:center;}
    .logo{width:52px;height:52px;margin:0 auto 20px;}
    h1{font-size:22px;font-weight:600;margin-bottom:4px;}
    .sub{font-size:13px;color:#888;margin-bottom:28px;}
    input{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid #E2E0D8;border-radius:8px;outline:none;background:#F8F9FA;color:#1A1A18;margin-bottom:10px;}
    input:focus{border-color:#1A6B55;background:white;}
    button{width:100%;padding:12px;font-size:14px;font-weight:600;background:#1A6B55;color:white;border:none;border-radius:8px;cursor:pointer;}
    button:hover{background:#0F4535;}
    .msg{font-size:12px;margin-top:12px;min-height:18px;}
    .error{color:#dc2626;}
    .success{color:#1A6B55;}
  </style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 52 52">
      <rect width="52" height="52" rx="13" fill="#1A6B55"/>
      <rect width="44" height="44" x="4" y="4" rx="10" fill="#25A07D" opacity=".4"/>
      <path d="M10 17 Q10 10 17 10 L35 10 Q42 10 42 17 L42 31 Q42 38 35 38 L28 38 L24 44 L22 38 L17 38 Q10 38 10 31 Z" fill="white" opacity=".95"/>
      <path d="M15 24 Q17 18 19 24 Q21 30 23 24 Q25 18 27 24 Q29 30 31 24 Q33 18 35 24 Q37 30 39 24" fill="none" stroke="#1A6B55" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <h1>OrthoBuddy</h1>
    <div class="sub">Choisissez un nouveau mot de passe</div>
    <input type="password" id="pwd1" placeholder="Nouveau mot de passe">
    <input type="password" id="pwd2" placeholder="Confirmer le mot de passe">
    <button onclick="doReset()">Enregistrer</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const SB_URL = 'https://xiznicrburryfmdfbjxk.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpem5pY3JidXJyeWZtZGZianhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDM0NjEsImV4cCI6MjA5NTYxOTQ2MX0.vYuV7LIBXXkKJkHVwNPaI-lA7x1HwFROdU1K17ZB1Y8';

    // Récupérer le token depuis le hash de l'URL
    function getTokenFromHash(){
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        type: params.get('type')
      };
    }

    async function doReset(){
      const msg = document.getElementById('msg');
      const pwd1 = document.getElementById('pwd1').value;
      const pwd2 = document.getElementById('pwd2').value;
      if(!pwd1){ msg.className='msg error'; msg.textContent='Saisissez un mot de passe'; return; }
      if(pwd1 !== pwd2){ msg.className='msg error'; msg.textContent='Les mots de passe ne correspondent pas'; return; }
      if(pwd1.length < 6){ msg.className='msg error'; msg.textContent='Minimum 6 caractères'; return; }

      const {access_token, type} = getTokenFromHash();
      if(!access_token || (type !== 'recovery' && type !== 'invite')){
        msg.className='msg error'; msg.textContent='Lien invalide ou expiré'; return;
      }

      try {
        const r = await fetch(SB_URL+'/auth/v1/user', {
          method: 'PUT',
          headers: {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+access_token},
          body: JSON.stringify({password: pwd1})
        });
        if(r.ok){
          msg.className='msg success';
          msg.textContent='✓ Mot de passe modifié ! Vous pouvez fermer cette page.';
          document.querySelector('button').disabled = true;
        } else {
          const err = await r.json();
          msg.className='msg error';
          msg.textContent = err.message || 'Erreur lors de la modification';
        }
      } catch(e){
        msg.className='msg error'; msg.textContent='Erreur de connexion';
      }
    }
  </script>
</body>
</html>
