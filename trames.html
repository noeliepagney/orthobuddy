<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrthoBuddy — Trames de bilans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
  :root{
    --creme:#F7F3EC; --creme-2:#FCFAF5; --surface:#FFFFFF;
    --ink:#3C3A33; --ink-soft:#6E695C;
    --sage:#6F8C6A; --sage-deep:#56714F; --sage-soft:#E7EDE2;
    --brique:#A65A43; --brique-soft:#F6E9E2;
    --border:#E7E0D3; --border-soft:#EFEADF;
    --radius:16px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(60,58,51,.04), 0 6px 20px rgba(60,58,51,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Nunito',system-ui,-apple-system,sans-serif;background:var(--creme);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:0 18px 90px}

  .topbar{position:sticky;top:0;z-index:50;background:rgba(247,243,236,.9);backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--border)}
  .topbar-inner{max-width:880px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.01em}
  .logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(150deg,var(--sage),var(--sage-deep));display:grid;place-items:center;color:#fff;font-size:20px;flex:0 0 auto}
  .brand small{display:block;font-weight:600;font-size:12px;color:var(--ink-soft)}
  .spacer{flex:1 1 auto}
  .save-state{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;min-height:20px}
  .save-state.dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--sage);display:inline-block}

  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin:22px 0 8px}
  .ctrl{display:flex;flex-direction:column;gap:5px}
  .ctrl label{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
  .ctrl select,.ctrl input{font-family:inherit;font-size:15px;color:var(--ink);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;min-width:220px}
  .ctrl select:focus,.ctrl input:focus,textarea:focus,input:focus,select:focus{outline:2px solid var(--sage);outline-offset:1px}

  .btn{font-family:inherit;font-weight:700;font-size:14.5px;cursor:pointer;border-radius:var(--radius-sm);padding:11px 16px;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .btn i{font-size:18px}
  .btn-primary{background:var(--sage);color:#fff}
  .btn-primary:hover{background:var(--sage-deep)}
  .btn-brique{background:var(--brique);color:#fff}
  .btn-brique:hover{filter:brightness(.93)}
  .btn-ghost{background:var(--surface);color:var(--ink);border-color:var(--border)}
  .btn-ghost:hover{background:var(--creme-2)}
  .btn-danger{background:transparent;color:var(--brique);border-color:transparent}
  .btn-danger:hover{background:var(--brique-soft)}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 26px}

  .lead{background:var(--creme-2);border:1px solid var(--border-soft);border-radius:var(--radius);padding:16px 18px;margin-bottom:8px;font-size:14.5px;color:var(--ink-soft)}
  .lead b{color:var(--ink)}

  details.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:14px 0;box-shadow:var(--shadow);overflow:hidden}
  details.section>summary{list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:12px;font-weight:800;font-size:16.5px;background:linear-gradient(180deg,#fff,#fffdf9)}
  details.section>summary::-webkit-details-marker{display:none}
  .sec-icon{width:30px;height:30px;border-radius:9px;background:var(--sage-soft);color:var(--sage-deep);display:grid;place-items:center;font-size:17px;flex:0 0 auto}
  .chev{margin-left:auto;color:var(--ink-soft);transition:transform .2s;font-size:20px}
  details.section[open] .chev{transform:rotate(180deg)}
  .sec-body{padding:4px 18px 20px;border-top:1px solid var(--border-soft)}

  .field{margin:16px 0}
  .field>label{display:block;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--ink)}
  .field .hint{font-weight:600;font-size:12.5px;color:var(--ink-soft);margin-left:6px}
  textarea,input.txt{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--creme-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;resize:vertical}
  textarea{min-height:74px;line-height:1.55}
  select.sel{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--creme-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}

  .subhead{display:flex;align-items:center;gap:8px;margin:22px 0 4px;font-weight:800;font-size:14.5px;color:var(--brique);text-transform:uppercase;letter-spacing:.04em}
  .subhead::after{content:"";flex:1;height:1px;background:var(--border)}

  /* Guide d'entretien : consignes / aides */
  .note{background:var(--brique-soft);border:1px solid #EBD3C7;border-left:3px solid var(--brique);border-radius:var(--radius-sm);padding:12px 14px;margin:14px 0;font-size:13.5px;color:#7a4733;line-height:1.6}
  .note .gt{display:block;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:11.5px;margin-bottom:4px;color:var(--brique)}
  .note b{color:#6a3a28}
  .note .ex{display:block;margin-top:6px;padding-left:10px;border-left:2px solid #E0BCA9;font-style:italic;color:#86604f}

  .scale{display:flex;align-items:center;gap:14px}
  .scale input[type=range]{flex:1;accent-color:var(--sage)}
  .scale .val{font-weight:800;font-size:17px;color:var(--sage-deep);min-width:46px;text-align:right}
  .scale small{color:var(--ink-soft);font-size:11.5px}

  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .chk{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:var(--creme-2);border:1px solid var(--border);border-radius:999px;padding:7px 13px;font-size:13.5px;font-weight:600;user-select:none;transition:.12s}
  .chk input{accent-color:var(--sage);width:15px;height:15px}
  .chk:has(input:checked){background:var(--sage-soft);border-color:var(--sage);color:var(--sage-deep)}

  /* Listes présence / absence */
  .plist{display:flex;flex-direction:column;gap:6px}
  .prow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .prow .cnt{width:130px;font-family:inherit;font-size:13px;background:var(--creme-2);border:1px solid var(--border);border-radius:8px;padding:6px 9px}
  /* Listes d'épreuves (score + commentaire) */
  .elist{display:flex;flex-direction:column;gap:8px}
  .erow{display:flex;flex-direction:column;gap:6px;padding:8px 10px;border:1px solid var(--border-soft);border-radius:10px;background:var(--creme-2)}
  .efields{display:flex;flex-direction:column;gap:6px;padding-left:24px;margin-top:2px}
  .efields .escore,.efields .ecom{font-family:inherit;font-size:13.5px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 10px}
  .efields .ecom{min-height:46px;resize:vertical}
  /* Grille consonnes */
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  @media(max-width:560px){.pgrid{grid-template-columns:1fr}}
  .pgrow{display:flex;align-items:center;gap:8px;background:var(--creme-2);border:1px solid var(--border-soft);border-radius:8px;padding:5px 8px}
  .pcons{font-weight:800;min-width:26px;color:var(--ink)}
  .pbtns{display:flex;gap:4px;margin-left:auto}
  .pbtn{font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--ink-soft);border-radius:7px;padding:4px 8px}
  .pbtn.on.b-m{background:var(--sage);color:#fff;border-color:var(--sage)}
  .pbtn.on.b-s{background:#C39A4E;color:#fff;border-color:#C39A4E}
  .pbtn.on.b-n{background:var(--brique);color:#fff;border-color:var(--brique)}
  /* Grille d'évaluation par niveau */
  .rgrid{display:flex;flex-direction:column;gap:6px}
  .rgrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rglabel{flex:1;min-width:150px;font-size:13.5px;font-weight:600}
  .rgsel{max-width:240px}

  /* Modal cabinet */
  .overlay{position:fixed;inset:0;background:rgba(46,44,38,.4);display:none;z-index:100;align-items:center;justify-content:center;padding:18px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius);max-width:520px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(46,44,38,.3)}
  .modal-head{padding:18px 20px;border-bottom:1px solid var(--border-soft);font-weight:800;font-size:17px;display:flex;align-items:center;gap:10px}
  .modal-body{padding:8px 20px 18px}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:10px}
  .mf{margin:13px 0}
  .mf label{display:block;font-weight:700;font-size:13px;margin-bottom:5px;color:var(--ink)}
  .mf input,.mf select{width:100%;font-family:inherit;font-size:14.5px;background:var(--creme-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
  .mf.profile{background:var(--sage-soft);margin:0 -20px 6px;padding:14px 20px;border-bottom:1px solid var(--border-soft)}
  .mf.profile select{background:#fff}

  @media print{.topbar,.controls,.actions,.lead{display:none}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div class="logo"><i class="ti ti-leaf"></i></div><div>OrthoBuddy<small>Trames de bilans</small></div></div>
      <div class="spacer"></div>
      <div class="save-state" id="saveState"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="controls">
      <div class="ctrl">
        <label for="trameSel">Trame de bilan</label>
        <select id="trameSel" class="sel"></select>
      </div>
      <div class="ctrl">
        <label for="patientSel">Patient</label>
        <select id="patientSel" class="sel"><option value="">— choisir un patient —</option></select>
      </div>
      <div class="ctrl">
        <label for="savedSel">Mes bilans enregistrés</label>
        <select id="savedSel" class="sel"></select>
      </div>
    </div>

    <div class="lead" id="lead"></div>

    <div class="actions">
      <button class="btn btn-brique" id="btnPdf"><i class="ti ti-file-type-pdf"></i> Aperçu &amp; PDF</button>
      <button class="btn btn-primary" id="btnWord"><i class="ti ti-file-type-docx"></i> Télécharger Word</button>
      <button class="btn btn-ghost" id="btnSettings"><i class="ti ti-building"></i> Cabinet &amp; signature</button>
      <button class="btn btn-ghost" id="btnBackup"><i class="ti ti-download"></i> Exporter une sauvegarde</button>
      <button class="btn btn-ghost" id="btnImport"><i class="ti ti-upload"></i> Importer</button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none">
      <div class="ctrl" style="display:flex;gap:6px;align-items:flex-end;">
        <div style="flex:1;">
          <label for="savedSel">Bilans enregistrés</label>
          <select id="savedSel" class="sel"><option value="">— ouvrir un bilan —</option></select>
        </div>
        <button id="btnDeleteSaved" class="btn btn-ghost" title="Supprimer" style="flex-shrink:0;padding:0 10px;height:36px;color:#c0392b;border-color:#c0392b;" disabled><i class="ti ti-trash"></i></button>
      </div>
      <button class="btn btn-ghost" id="btnRenew" style="display:none"><i class="ti ti-copy"></i> Renouvellement</button>
      <button class="btn btn-danger" id="btnReset"><i class="ti ti-eraser"></i> Réinitialiser</button>
    </div>

    <div id="form"></div>
  </div>

  <!-- Modal cabinet -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head"><i class="ti ti-building"></i> Cabinet &amp; signature</div>
      <div class="modal-body">
        <p style="color:var(--ink-soft);font-size:13.5px;margin-top:6px">Ces informations alimentent l'en-tête et la signature des comptes rendus. Enregistrez un ou plusieurs profils ; celui sélectionné est utilisé pour les exports.</p>
        <div class="mf profile"><label>Profil enregistré</label><select id="cab_profileSel"></select></div>
        <div class="mf"><label>Nom du cabinet</label><input id="cab_cabinet" placeholder="Cabinet d'orthophonie …"></div>
        <div class="mf"><label>Nom du praticien</label><input id="cab_nom" placeholder="Prénom Nom"></div>
        <div class="mf"><label>Statut</label><input id="cab_statut" placeholder="Orthophoniste"></div>
        <div class="mf"><label>Adresse</label><input id="cab_adresse" placeholder="Rue, code postal, ville"></div>
        <div class="mf"><label>Téléphone</label><input id="cab_tel" placeholder="03 …"></div>
        <div class="mf"><label>Email</label><input id="cab_email" placeholder="email@…"></div>
        <div class="mf"><label>Certifications / mentions (optionnel)</label><input id="cab_certifs" placeholder="Praticien certifié LSVT® …"></div>
        <div class="mf" style="border-top:1px solid var(--border-soft);padding-top:14px"><label>Nom de ce profil</label><input id="cab_profileName" placeholder="ex. Cabinet principal"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-danger" id="cabDelete"><i class="ti ti-trash"></i> Supprimer ce profil</button>
        <div class="spacer"></div>
        <button class="btn btn-ghost" id="cabCancel">Annuler</button>
        <button class="btn btn-primary" id="cabSave"><i class="ti ti-check"></i> Enregistrer</button>
      </div>
    </div>
  </div>

<script>
/* ============================================================================
   OrthoBuddy — Moteur de trames de bilans (autonome, localStorage)
   Data-driven : 1 moteur + 1 config par trame.
   Types de champ : text | textarea | select | checkboxes | scale | note | subhead
   Les id de stockage sont DÉTERMINISTES : trameId.sectionId.champId
   - inHeader:true  -> le champ alimente l'en-tête du document (pas la section)
   - meta:true (section) -> section de saisie d'en-tête, pas rendue comme bloc CR
   ========================================================================= */

const TRAMES = {

  "odorat-gout": {
    titre: "Neurologie — Troubles de l'odorat et du goût",
    docTitle: "Bilan orthophonique des troubles de l'olfaction et de la gustation",
    sections: [

      { id:"entete", titre:"En-tête du document", icon:"ti-mail", meta:true,
        champs:[
          { id:"destinataire", label:"Médecin destinataire (prescripteur)", type:"text" },
          { id:"copies", label:"Copies (autres destinataires)", type:"text" },
          { id:"date_bilan", label:"Date du bilan", type:"text" },
        ]},

      { id:"administratif", titre:"Éléments administratifs", icon:"ti-id",
        champs:[
          { id:"nom", label:"Nom", type:"text", auto:true, inHeader:true },
          { id:"prenom", label:"Prénom", type:"text", auto:true, inHeader:true },
          { id:"ddn", label:"Date de naissance (âge le jour du bilan)", type:"text", auto:true, inHeader:true },
          { id:"adresse", label:"Adresse", type:"text", inHeader:true },
          { id:"secu", label:"Numéro de sécurité sociale", type:"text", inHeader:true },
          { id:"profession", label:"Profession", type:"text" },
          { id:"situation", label:"Situation familiale", type:"text" },
          { id:"duree", label:"Durée et horaire du bilan", type:"text" },
        ]},

      { id:"demande", titre:"Demande / plainte", icon:"ti-message-2",
        champs:[
          { id:"plainte", label:"Plainte actuelle", type:"textarea" },
          { id:"demande", label:"Demande", type:"textarea" },
        ]},

      { id:"anamnese", titre:"Anamnèse", icon:"ti-notebook",
        champs:[
          { id:"atcd_med", label:"Antécédents médicaux récents / anciens", type:"textarea" },
          { id:"atcd_orl", label:"Antécédents ORL récents / anciens", type:"textarea" },
          { id:"traitement", label:"Traitement médical actuel et iatrogénie", type:"textarea" },
          { id:"poids", label:"Poids (kg)", type:"text", half:true },
          { id:"taille", label:"Taille (m)", type:"text", half:true },
          { id:"regime", label:"Régime alimentaire", type:"textarea" },
          { id:"modif_alim", label:"Modification de l'alimentation", type:"textarea" },
          { id:"histoire", label:"Histoire de la maladie", type:"textarea" },
        ]},

      { id:"types_eval", titre:"Bilan — Types d'évaluation", icon:"ti-flask",
        champs:[
          { id:"note1", type:"note", text:"<span class='gt'>Repère</span>L'orthophoniste n'est pas ORL : iel ne dispose pas nécessairement de tests normés (Sniffin' Sticks test). L'évaluation vise <b>l'olfaction</b> (et non l'odorat) et <b>la gustation</b> (et non le goût). Les épreuves peuvent aussi renseigner sur les mémoires de travail et sensorielle du patient." },
          { id:"note2", type:"note", text:"<span class='gt'>Matériel</span>Privilégier des flacons déjà prêts, incolores ou non visibles par le patient — ni la taille ni la couleur ne doivent l'influencer, sinon le test est biaisé. <b>C'est le bilan le plus biaisable de tous : vigilance.</b> Pour chaque épreuve, noter le matériel utilisé (marque + présentation : odeur liquide / solide / spray ; pour les sprays, indiquer le nombre de pulvérisations sur la touche). Le goût est le sens le plus influençable : attention particulière à la gustation." },
          { id:"type_bilan", label:"Type de bilan", type:"select", options:["Bilan d'investigation","Bilan classique","Bilan de renouvellement"] },
          { id:"domaines", label:"Domaine(s) exploré(s)", type:"textarea" },
          { id:"tests", label:"Nom des test(s) utilisé(s)", type:"textarea" },
        ]},

      { id:"echelles", titre:"Échelles d'auto-évaluation", icon:"ti-adjustments",
        champs:[
          { id:"note_ech", type:"note", text:"<span class='gt'>Consigne</span>Échelles inspirées de l'auto-évaluation de la douleur : de 1 à 10 — 1 = peu de retentissement, 10 = fort retentissement." },
          { id:"ech_odeur_avant", label:"Importance de l'odeur dans la vie d'avant", type:"scale" },
          { id:"ech_handicap_odeur", label:"Vécu du handicap aujourd'hui (odeur)", type:"scale" },
          { id:"ech_gout_avant", label:"Importance du goût dans la vie d'avant", type:"scale" },
          { id:"ech_handicap_gout", label:"Vécu du handicap aujourd'hui (goût)", type:"scale" },
        ]},

      { id:"profil", titre:"Synthèse — Profil olfactif", icon:"ti-user-heart",
        champs:[
          { id:"note_prof", type:"note", text:"<span class='gt'>Profil olfactif</span>(et non plus « portrait olfactif »). Reconstituer l'environnement olfactif du patient." },
          { id:"enfance", label:"Enfance (lieu)", type:"text" },
          { id:"plat_pref", label:"Plat préféré", type:"text", half:true },
          { id:"boisson_pref", label:"Boisson préférée", type:"text", half:true },
          { id:"detestes", label:"Plat et boisson détestés", type:"text" },
          { id:"tabac", label:"Tabagisme", type:"select", options:["Non","Actif","Passif"] },
          { id:"animaux", label:"Animaux", type:"text" },
          { id:"lieu_vie", label:"Lieu de vie actuel", type:"text" },
          { id:"note_maison", type:"note", text:"<span class='gt'>Odeurs de la maison</span>Produits d'entretien (marques et parfums) ? Existence d'une cheminée — en fonction ou décorative ? Fleurs coupées ? Fleurs séchées ? Etc." },
          { id:"odeurs_maison", label:"Odeurs de la maison", type:"textarea" },
          { id:"hygiene", label:"Produits d'hygiène", type:"textarea", hint:"Marques et parfums" },
          { id:"parfum", label:"Parfum", type:"text", half:true },
          { id:"parfum_conj", label:"Parfum du / de la conjoint·e", type:"text", half:true },
          { id:"note_pyr", type:"note", text:"<span class='gt'>Astuce</span>Chercher les pyramides olfactives, notamment les notes de cœur et de fond." },
        ]},

      { id:"souvenir", titre:"Synthèse — Souvenir olfactif", icon:"ti-bulb",
        champs:[
          { id:"note_souv", type:"note", text:"<span class='gt'>Consigne</span>« Pouvez-vous me raconter un souvenir lié directement à une odeur ? » Ce peut être une odeur hédonique positive et/ou négative.<br>Noter si l'exercice est aisé ou difficile pour le patient." },
          { id:"souvenir", label:"Souvenir rapporté", type:"textarea" },
          { id:"souv_diff", label:"Réalisation de l'exercice", type:"select", options:["Aisée","Difficile"] },
        ]},

      { id:"discrimination", titre:"Olfaction — Discrimination pure", icon:"ti-circles",
        champs:[
          { id:"sub_tri", type:"subhead", text:"Test triangulaire (avec leurre ++)" },
          { id:"note_tri", type:"note", text:"<span class='gt'>Protocole</span>Proposer 3 touches d'odeurs dont <b>1 leurre</b> (touche trempée dans un flacon d'eau).<br><b>Consigne :</b> « Sentez chaque touche, concentrez-vous non pas sur ce que c'est mais sur votre ressenti. »<br>Guider avec des questions précises : odeur forte ou faible ? (détection) — familière ? qui vous plaît ? (hédonique positif) — qui reste ou qui est fugace ? — premier mot qui vient à l'esprit ?<span class='ex'>Ex. (T = touche) — T1 COCO : « je détecte, au départ fleuri puis sucré/caramélisé, odeur stable, peut-être l'odeur du papier, hédonique positif, non reliée à quelque chose de particulier » (persistance de l'odeur n°1). T2 LEURRE : « interrogation sur un reliquat du n°1, odeur qui s'évanouit, sensation que la touche n'a pas de parfum ». T3 CLOU DE GIROFLE : « ah si, ça me fait penser au clou de girofle ! »</span><b>Attention :</b> si le patient sent une odeur sur le leurre, c'est le signe d'une perturbation importante du système olfactif." },

          { id:"tri_obs", label:"Observations par touche (T1 / T2 / T3)", type:"textarea" },
          { id:"tri_comp", label:"Comportement sur touche", type:"textarea", hint:"Adhésif ? Persistant ? Perturbation du système olfactif ? Respectueux du cycle nasal ?" },

          { id:"note_pareil", type:"note", text:"<span class='gt'>Repli</span>Si le test triangulaire est difficile ou échoué, proposer un test plus facile : 2 touches (odeurs identiques ou différentes).<br><b>Consigne :</b> « Sentez ces deux touches, avez-vous l'impression qu'il s'agit de deux odeurs identiques ou différentes ? »<br>3 niveaux de difficulté : 2 familles olfactives opposées (facile) → 2 odeurs différentes d'une même famille (moyen) → 2 odeurs identiques (difficile)." },
          { id:"pareil_res", label:"Résultat", type:"select", options:["Réussi","Échoué"] },
          { id:"pareil_niv", label:"Niveau de difficulté", type:"select", options:["Facile","Moyen","Difficile"] },

        ]},

function loadPatients(){
  fetch(SB_URL+"/rest/v1/orthobuddy_data?user_id=eq.b443cde9-7186-4239-85ac-e48f1912e51a&select=data", {
    headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON}

      allPatients=rows[0].data.patients;
    } else { allPatients=[]; }
    renderPatientSel(allPatients);
  }).catch(()=>{ allPatients=[]; renderPatientSel([]); });

function renderPatientSel(patients){
  const sel=$("#patientSel"); if(!sel) return;
  sel.innerHTML="<option value=''>— choisir un patient —</option>";
  const actifs=patients.filter(p=>!p.statut||p.statut==='actif'||p.statut==='attente');
  actifs.sort((a,b)=>((a.nom||'')+(a.prenom||'')).localeCompare((b.nom||'')+(b.prenom||'')));
  actifs.forEach(p=>{
    const o=document.createElement("option");
    o.value=p.id;
    o.textContent=(p.nom||'')+' '+(p.prenom||'');
    sel.appendChild(o);
  });
  const urlPid=new URLSearchParams(window.location.search).get('patient_id');
  if(urlPid){ sel.value=urlPid; onPatientChange(); }
}

function onPatientChange(){
  const pid=$("#patientSel").value;
  currentPatientId=pid||null;
  currentBilanId=null;
  data={};
  if(pid){
    refreshSaved();
    if(trameId){
      const p=allPatients.find(x=>x.id===pid);
      if(p) setTimeout(()=>prefillFromPatient(p),200);
    }
  } else {
    $("#savedSel").innerHTML="<option value=''>— ouvrir un bilan —</option>";
    $("#btnRenew").style.display="none";
    $("#btnDeleteSaved").disabled=true;
  }
  if(trameId){ renderForm(); markSaved(); }
}

function prefillFromPatient(p){
  const map={
    [trameId+".administratif.nom"]:p.nom||'',
    [trameId+".administratif.prenom"]:p.prenom||'',
    [trameId+".administratif.ddn"]:p.ddn||p.dateNaissance||'',
    [trameId+".administratif.adresse"]:p.adresse||'',
    [trameId+".administratif.secu"]:p.secu||p.numSecu||''
  };
  Object.entries(map).forEach(([k,v])=>{ if(v&&!data[k]) data[k]=v; });
  renderForm();
}

  if(!currentPatientId){ markSaved(); return; }
  const payload={
    patient_id:currentPatientId,

async function refreshSaved(){
  const sel=$("#savedSel"); if(!sel) return;
  sel.innerHTML="<option value=''>— ouvrir un bilan —</option>";
  if(!currentPatientId) return;
  try{
    const res=await fetch(SB_URL+"/rest/v1/bilans?patient_id=eq."+currentPatientId+"&archived=eq.false&order=updated_at.desc",{
      headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON}
    });
    const rows=await res.json();
    if(!Array.isArray(rows)) return;
    rows.forEach(b=>{
      const tt=TRAMES[b.type_bilan]?TRAMES[b.type_bilan].titre:b.type_bilan;
      const date=b.date_bilan?" · "+b.date_bilan:"";
      const o=document.createElement("option");
      o.value=b.id; o.textContent=tt+date;
      sel.appendChild(o);
    });
    $("#btnRenew").style.display=rows.length>0?"":"none";
  }catch(e){ console.error(e); }
}

async function openSaved(bilanId){
  try{
    const res=await fetch(SB_URL+"/rest/v1/bilans?id=eq."+bilanId,{
      headers:{"apikey":SB_ANON,"Authorization":"Bearer "+SB_ANON}
    });
    const rows=await res.json();
    if(!rows||!rows[0]) return;
    const b=rows[0];
    if(!TRAMES[b.type_bilan]) return;
    currentBilanId=b.id; currentPatientId=b.patient_id;
    trameId=b.type_bilan; data=b.data||{};
    // Synchroniser trameSel
    if(b.type_bilan && $("#trameSel")) $("#trameSel").value=b.type_bilan;
    if(b.patient_id) $("#patientSel").value=b.patient_id;
    renderForm(); markSaved();
    $("#btnRenew").style.display="";
    $("#btnDeleteSaved").disabled=false;
  }catch(e){ console.error(e); }
}

function renderForm(){
  const t=TRAMES[trameId], form=$("#form");
  $("#lead").innerHTML = "<b>"+esc(t.docTitle||t.titre)+"</b> — complétez les sections ci-dessous. Les encadrés sont des consignes d'entretien (ils restent ici et n'apparaissent pas dans le compte rendu). Les champs vides sont masqués à l'export.";
  form.innerHTML="";

  t.sections.forEach((sec,si)=>{
    const det=document.createElement("details"); det.className="section";
    det.innerHTML="<summary><span class='sec-icon'><i class='ti "+(sec.icon||"ti-folder")+"'></i></span>"+esc(sec.titre)+"<i class='ti ti-chevron-down chev'></i></summary><div class='sec-body'></div>";
    const body=$(".sec-body",det);
    let i=0;
    while(i<sec.champs.length){
      const c=sec.champs[i];
      if(c.half && sec.champs[i+1] && sec.champs[i+1].half){
        const r=document.createElement("div"); r.className="row2";
        r.appendChild(renderChamp(sec.id,c)); r.appendChild(renderChamp(sec.id,sec.champs[i+1]));

function renderChamp(secId,c){
  const key=ck(secId,c.id);
  if(c.type==="note"){ const d=document.createElement("div"); d.className="note"; d.innerHTML=c.text; return d; }
  if(c.type==="subhead"){ const d=document.createElement("div"); d.className="subhead"; d.textContent=c.text; return d; }

  const wrap=document.createElement("div"); wrap.className="field";
  const id="f-"+slug(key);
  const lab="<label for='"+id+"'>"+esc(c.label)+
    (c.auto?" <span class='hint'><i class='ti ti-link'></i> fiche patient</span>":"")+
    (c.hint?" <span class='hint'>· "+esc(c.hint)+"</span>":"")+"</label>";

  let v=data[key];
  if(v===undefined && c.def!==undefined){ v=c.def; data[key]=v; }

  if(c.type==="textarea"){
    wrap.innerHTML=lab+"<textarea id='"+id+"'></textarea>";
    const el=$("textarea",wrap); el.value=v||""; el.addEventListener("input",()=>{ data[key]=el.value; scheduleSave(); });
  } else if(c.type==="text"){
    wrap.innerHTML=lab+"<input id='"+id+"' class='txt' type='text' autocomplete='off'>";
    const el=$("input",wrap); el.value=v||""; el.addEventListener("input",()=>{ data[key]=el.value; scheduleSave(); });
  } else if(c.type==="select"){
    let o="<option value=''>— choisir —</option>";
    c.options.forEach(x=>{ o+="<option"+(x===v?" selected":"")+">"+esc(x)+"</option>"; });
    wrap.innerHTML=lab+"<select id='"+id+"' class='sel'>"+o+"</select>";
    const el=$("select",wrap); el.addEventListener("change",()=>{ data[key]=el.value; scheduleSave(); });
  } else if(c.type==="scale"){
    const n=(v===undefined||v==="")?0:Number(v);
    wrap.innerHTML=lab+"<div class='scale'><small>1</small><input id='"+id+"' type='range' min='0' max='10' step='1'><small>10</small><span class='val'></span></div>";
    const el=$("input",wrap), out=$(".val",wrap); el.value=n;
    const r=()=>{ out.textContent=(Number(el.value)===0?"—":el.value+"/10"); };
    r(); el.addEventListener("input",()=>{ data[key]=Number(el.value); r(); scheduleSave(); });
  } else if(c.type==="checkboxes"){
    const sel=Array.isArray(v)?v:[];
    let h=lab+"<div class='checks'>";
    c.options.forEach((x,oi)=>{ const cid=id+"-"+oi; h+="<label class='chk'><input type='checkbox' id='"+cid+"' value=\""+esc(x)+"\""+(sel.indexOf(x)>=0?" checked":"")+"> "+esc(x)+"</label>"; });
    h+="</div>"; wrap.innerHTML=h;
    wrap.querySelectorAll("input[type=checkbox]").forEach(b=>{ b.addEventListener("change",()=>{ data[key]=[...wrap.querySelectorAll("input:checked")].map(x=>x.value); scheduleSave(); }); });
  } else if(c.type==="presence_list"){
    const st=(v&&typeof v==="object")?v:{};
    let h=lab+"<div class='plist'>";
    c.options.forEach((o,oi)=>{
      const ol=(typeof o==="string")?{label:o}:o;
      const cur=st[ol.label]||{}; const checked=!!cur.p; const cnt=cur.n||"";
      h+="<div class='prow'><label class='chk'><input type='checkbox'"+(checked?" checked":"")+"> "+esc(ol.label)+"</label>";
      if(ol.count){ h+="<input class='cnt' type='text' inputmode='numeric' placeholder='nombre de fois' value=\""+att(cnt)+"\""+(checked?"":" style='display:none'")+">"; }
      h+="</div>";
    });
    h+="</div>"; wrap.innerHTML=h;
    const rows=[...wrap.querySelectorAll(".prow")];
    const commit=()=>{ const obj={}; rows.forEach((row,oi)=>{ const ol=(typeof c.options[oi]==="string")?{label:c.options[oi]}:c.options[oi]; const cb=row.querySelector("input[type=checkbox]"); const ce=row.querySelector(".cnt"); obj[ol.label]={p:cb.checked,n:ce?ce.value:""}; }); data[key]=obj; scheduleSave(); };
    rows.forEach(row=>{ const cb=row.querySelector("input[type=checkbox]"); const ce=row.querySelector(".cnt"); cb.addEventListener("change",()=>{ if(ce) ce.style.display=cb.checked?"":"none"; commit(); }); if(ce) ce.addEventListener("input",commit); });
  } else if(c.type==="epreuves_list"){
    const st=(v&&typeof v==="object")?v:{};
    let h=lab+"<div class='elist'>";
    c.options.forEach((o,oi)=>{
      const cur=st[o]||{}; const used=!!cur.u;
      h+="<div class='erow'><label class='chk'><input type='checkbox'"+(used?" checked":"")+"> "+esc(o)+"</label>";
      h+="<div class='efields'"+(used?"":" style='display:none'")+"><input class='escore' type='text' placeholder='Score / étalonnage' value=\""+att(cur.s||"")+"\"><textarea class='ecom' placeholder='Commentaire'>"+esc(cur.c||"")+"</textarea></div></div>";
    });
    h+="</div>"; wrap.innerHTML=h;
    const rows=[...wrap.querySelectorAll(".erow")];
    const commitE=()=>{ const obj={}; rows.forEach((row,oi)=>{ const cb=row.querySelector("input[type=checkbox]"); obj[c.options[oi]]={u:cb.checked,s:row.querySelector(".escore").value,c:row.querySelector(".ecom").value}; }); data[key]=obj; scheduleSave(); };
    rows.forEach(row=>{ const cb=row.querySelector("input[type=checkbox]"); const ef=row.querySelector(".efields"); cb.addEventListener("change",()=>{ ef.style.display=cb.checked?"":"none"; commitE(); }); row.querySelector(".escore").addEventListener("input",commitE); row.querySelector(".ecom").addEventListener("input",commitE); });
  } else if(c.type==="phoneme_grid"){
    const buckets=c.buckets||[{key:"m",label:"Maîtrisée"},{key:"s",label:"Stimulable"},{key:"n",label:"Non produite"}];
    let h=lab+"<div class='pgrid'>";
    c.consonnes.forEach(cons=>{
      const cur=(v&&typeof v==="object")?(v[cons]||""):"";
      h+="<div class='pgrow'><span class='pcons'>"+esc(cons)+"</span><span class='pbtns'>";
      buckets.forEach(b=>{ const on=cur===b.key; h+="<button type='button' class='pbtn"+(on?" on b-"+b.key:"")+"' data-c=\""+att(cons)+"\" data-b='"+b.key+"'>"+esc(b.label)+"</button>"; });
      h+="</span></div>";
    });
    h+="</div>"; wrap.innerHTML=h;
    wrap.querySelectorAll(".pbtn").forEach(btn=>{ btn.addEventListener("click",()=>{
      const cons=btn.getAttribute("data-c"), b=btn.getAttribute("data-b");
      const cur=(data[key]&&typeof data[key]==="object")?data[key]:{};
      cur[cons]=(cur[cons]===b)?"":b; data[key]=cur;
      const row=btn.closest(".pgrow"); row.querySelectorAll(".pbtn").forEach(x=>{ x.className="pbtn"; });
      if(cur[cons]){ const a=row.querySelector(".pbtn[data-b='"+cur[cons]+"']"); if(a) a.className="pbtn on b-"+cur[cons]; }
      scheduleSave();
    }); });
  } else if(c.type==="rating_grid"){
    let h=lab+"<div class='rgrid'>";
    c.rows.forEach(rw=>{
      const cur=(v&&typeof v==="object")?(v[rw]||""):"";
      h+="<div class='rgrow'><span class='rglabel'>"+esc(rw)+"</span><select class='sel rgsel' data-r=\""+att(rw)+"\"><option value=''>—</option>";
      c.levels.forEach(lv=>{ h+="<option"+(cur===lv?" selected":"")+">"+esc(lv)+"</option>"; });
      h+="</select></div>";
    });
    h+="</div>"; wrap.innerHTML=h;
    wrap.querySelectorAll(".rgsel").forEach(se=>{ se.addEventListener("change",()=>{ const cur=(data[key]&&typeof data[key]==="object")?data[key]:{}; cur[se.getAttribute("data-r")]=se.value; data[key]=cur; scheduleSave(); }); });
  }
  if(c.showIf){ wrap.setAttribute("data-showif-key", ck(secId,c.showIf.field)); wrap.setAttribute("data-showif-val", c.showIf.value); }
  return wrap;
}

function att(s){ return esc(s).replace(/"/g,"&quot;"); }
function applyConditional(){
  document.querySelectorAll("#form [data-showif-key]").forEach(el=>{
    const key=el.getAttribute("data-showif-key"), val=el.getAttribute("data-showif-val");
    const v=data[key]; const on=Array.isArray(v)? v.indexOf(val)>=0 : (v===val);
    el.style.display = on? "" : "none";
  });

/* ---------- Construction du corps du document (partagé PDF + Word) ------ */
function fmtValue(c,v){
  if(c.type==="checkboxes"){ if(Array.isArray(v)&&v.length) return v.join(", "); return c.ifEmpty? c.ifEmpty : ""; }
  if(c.type==="scale") return (v&&Number(v)>0)? (Number(v)+"/10"):"";
  if(c.type==="presence_list"){
    if(!v||typeof v!=="object") return "";
    const showAbsent=c.showAbsent!==false; const lines=[];
    c.options.forEach(o=>{ const ol=(typeof o==="string")?{label:o}:o; const st=v[ol.label]||{};
      if(st.p){ if(ol.count) lines.push(ol.label+(st.n?" ("+st.n+" fois)":"")); else if(!showAbsent) lines.push(ol.label); }
      else if(showAbsent) lines.push(ol.label+" : non observé");
    });
    return lines.join("\n");
  }
  if(c.type==="epreuves_list"){
    if(!v||typeof v!=="object") return "";
    const lines=[]; c.options.forEach(o=>{ const st=v[o]||{}; if(st.u){ let l=o; if(st.s) l+=" — "+st.s; if(st.c) l+=" : "+st.c; lines.push(l); } });
    return lines.join("\n");
  }
  if(c.type==="phoneme_grid"){
    if(!v||typeof v!=="object") return "";
    const buckets=c.buckets||[{key:"m",exportLabel:"Consonnes maîtrisées"},{key:"s",exportLabel:"Consonnes stimulables"},{key:"n",exportLabel:"Consonnes non produites"}];
    const lines=[]; buckets.forEach(b=>{ const list=c.consonnes.filter(x=>v[x]===b.key); if(list.length) lines.push((b.exportLabel||b.label)+" : "+list.join(", ")); });
    return lines.join("\n");
  }
  if(c.type==="rating_grid"){
    if(!v||typeof v!=="object") return "";
    const lines=[]; c.rows.forEach(rw=>{ if(v[rw]) lines.push(rw+" : "+v[rw]); }); return lines.join("\n");
  }
  let s=(v==null)?"":String(v).trim(); if(s==="—") s=""; return s;
}

}

function buildDocBody(){
  const t=TRAMES[trameId], cab=getCabinet();
  const g=(s,c)=>esc(val(s,c)||"");
  const nom=g("administratif","nom"), prenom=g("administratif","prenom"),

  const dest=g("entete","destinataire"), copies=g("entete","copies"), dateBilan=g("entete","date_bilan");

    (copies?"<p style='margin:0'>Copies : "+copies+"</p>":"")+"</div>";
  const header="<table width='100%' cellpadding='0' cellspacing='0'><tr>"+
    "<td style='vertical-align:top;width:55%'>"+left+"</td><td style='vertical-align:top'>"+right+"</td></tr></table>";

  // Bandeau-titre
  const titleBanner="<table width='100%' cellspacing='0' cellpadding='0' style='border-collapse:collapse;margin:16px 0'><tr><td bgcolor='"+C.brique+"' style='background:"+C.brique+";padding:11px 16px;text-align:center'>"+
    "<p style='margin:0;color:#fff;font-weight:bold;font-size:15px;letter-spacing:.03em;text-transform:uppercase;line-height:1.25'>"+esc(t.docTitle||t.titre)+"</p>"+
    "<p style='margin:4px 0 0;color:#fff;font-size:11px;line-height:1.2'>Confidentiel et soumis au secret médical</p></td></tr></table>";

  const subline="<p style='text-align:center;font-style:italic;font-size:12px;color:"+C.inkSoft+";margin:8px 0 14px'>"+
    "Bilan réalisé par "+(prat||"…")+(statut?", "+statut:"")+(dateBilan?" — "+dateBilan:"")+"</p>";

  // Bloc patient
  const patRight="Patient <b>"+(nom||"")+" "+(prenom||"")+"</b>"+(ddn?", né(e) le "+ddn:"")+(secu?"<br>Assuré n° "+secu:"")+(adr?"<br>"+adr:"");
  const patient="<table width='100%' cellpadding='0' cellspacing='0' bgcolor='"+C.creme+"' style='background:"+C.creme+";border:1px solid "+C.border+"'><tr>"+
    "<td style='vertical-align:top;padding:9px 12px;font-size:12.5px'><p style='margin:0;line-height:1.4'>"+(dateBilan?"Date du bilan : "+dateBilan:"")+"</p></td>"+

  // Sections
  let body="";

    if(sec.meta) return;

  const note=(!body)? "<p style='color:#999'>Aucune donnée saisie pour le moment.</p>":"";

  return header+titleBanner+subline+patient+(body||note)+signature;

    "document.getElementById('btnDl').addEventListener('click',dl);";
  const html="<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'><title>"+esc(t.docTitle||t.titre)+"</title>"+
    "<link href='https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap' rel='stylesheet'>"+
    "<script src='https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js'><\/script>"+
    "<style>"+css+"</style></head><body>"+inner+
    "<script>"+js+"<\/script>"+
    "</body></html>";
  const w=window.open("","_blank");
  if(!w){ alert("Le navigateur a bloqué la fenêtre. Autorisez les pop-up pour ce site."); return; }
  w.document.open(); w.document.write(html); w.document.close();
}

/* ---------- Export Word (.doc) ------------------------------------------ */
function exportWord(){
  const t=TRAMES[trameId];
  const patient=$("#patientInput").value.trim()||"patient";
  const wordHtml="<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>"+
    "<head><meta charset='utf-8'><title>"+esc(t.docTitle||t.titre)+"</title>"+
    "<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->"+
    "<style>@page WordSection1{size:21cm 29.7cm;margin:1.6cm 1.8cm}div.WordSection1{page:WordSection1}"+
    "body{font-family:'Calibri','Segoe UI',sans-serif;color:"+C.ink+";font-size:11pt;line-height:1.35}"+
    "p{margin:0 0 3pt;mso-line-height-rule:exactly} td p{margin:0} table{border-collapse:collapse}</style></head><body><div class='WordSection1'>"+
    buildDocBody()+
    "<p style='margin-top:26px;font-size:8.5pt;color:#9a9486;border-top:1px solid "+C.border+";padding-top:6px'>Document confidentiel — soumis au secret médical · Généré avec OrthoBuddy</p>"+
    "</div></body></html>";
  const blob=new Blob(["\ufeff"+wordHtml],{type:"application/msword"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Bilan_"+slug(patient)+"_"+slug(t.titre)+".doc";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },1500);
}

/* ---------- Modal cabinet ----------------------------------------------- */
function fillCabFields(c){ c=c||{}; CABFIELDS.forEach(f=>{ $("#cab_"+f).value=c[f]||""; }); if(!c.statut) $("#cab_statut").value="Orthophoniste"; }
function readCabFields(){ const c={}; CABFIELDS.forEach(f=>{ c[f]=$("#cab_"+f).value.trim(); }); return c; }
function refreshProfileSelect(selectName){
  const profs=getProfiles(), sel=$("#cab_profileSel"); sel.innerHTML="";
  Object.keys(profs).forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; sel.appendChild(o); });
  const nw=document.createElement("option"); nw.value="__new__"; nw.textContent="+ Nouveau profil"; sel.appendChild(nw);
  if(selectName!==undefined && selectName!==null) sel.value=selectName;
}
function loadProfileIntoForm(name){
  const profs=getProfiles();
  if(name==="__new__" || !profs[name]){ fillCabFields({}); $("#cab_profileName").value=""; }
  else { fillCabFields(profs[name]); $("#cab_profileName").value=name; }
}
function openCabinet(){
  migrateProfiles();
  const profs=getProfiles(), active=getActiveName();
  const start=(active && profs[active]) ? active : (Object.keys(profs)[0] || "__new__");
  refreshProfileSelect(start);
  loadProfileIntoForm(start);
  $("#overlay").classList.add("open");
}
function closeCabinet(){ $("#overlay").classList.remove("open"); }
function saveCabinet(){
  const c=readCabFields();
  let name=$("#cab_profileName").value.trim();
  if(!name) name=c.cabinet||"Mon cabinet";
  const profs=getProfiles(); profs[name]=c; setProfiles(profs); setActiveName(name);
  closeCabinet();
}
function deleteProfile(){
  const cur=$("#cab_profileSel").value, profs=getProfiles();
  if(cur==="__new__" || !profs[cur]){ closeCabinet(); return; }
  if(!confirm("Supprimer le profil « "+cur+" » ?")) return;
  delete profs[cur]; setProfiles(profs);
  const next=Object.keys(profs)[0]||"";
  setActiveName(next);
  refreshProfileSelect(next||"__new__");
  loadProfileIntoForm(next||"__new__");
}

/* ---------- Init -------------------------------------------------------- */
function init(){
  migrateProfiles();
  // Peupler le sélecteur de trames
  const trameSel=$("#trameSel");
  Object.keys(TRAMES).forEach(id=>{ const o=document.createElement("option"); o.value=id; o.textContent=TRAMES[id].titre; trameSel.appendChild(o); });
  trameId=trameSel.value;
  $("#saveState").textContent="Chargement…";

  loadPatients();

  trameSel.addEventListener("change",()=>{ trameId=trameSel.value; loadData(); renderForm(); markSaved(); });
  $("#patientSel").addEventListener("change",onPatientChange);

  const savedSelEl=$("#savedSel");
  if(savedSelEl) savedSelEl.addEventListener("change",e=>{
    const k=e.target.value;
    const del=$("#btnDeleteSaved"); if(del) del.disabled=!k;
    if(k) openSaved(k);
  });

  const delBtn=$("#btnDeleteSaved");
  if(delBtn) delBtn.addEventListener("click",()=>{
    const k=$("#savedSel")?$("#savedSel").value:"";
    if(!k) return;
    if(!confirm("Supprimer définitivement ce bilan ?\nCette action est irréversible.")) return;
    deleteSaved(k);
  });

  $("#btnRenew").addEventListener("click",renewBilan);
  $("#btnBackup").addEventListener("click",exportBackup);
  $("#btnImport").addEventListener("click",()=>$("#importFile").click());
  $("#importFile").addEventListener("change",e=>{ const f=e.target.files[0]; if(f) importBackup(f); e.target.value=""; });
  $("#btnPdf").addEventListener("click",exportPDF);
  $("#btnWord").addEventListener("click",exportWord);
  $("#btnSettings").addEventListener("click",openCabinet);
  $("#cabSave").addEventListener("click",saveCabinet);
  $("#cabCancel").addEventListener("click",closeCabinet);
  $("#cabDelete").addEventListener("click",deleteProfile);
  $("#cab_profileSel").addEventListener("change",e=>{ loadProfileIntoForm(e.target.value); if(e.target.value==="__new__") $("#cab_profileName").focus(); });
  $("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeCabinet(); });

  $("#btnReset").addEventListener("click",()=>{
    if(!trameId||!currentPatientId) return;
    if(confirm("Effacer toutes les données saisies pour ce bilan ?")){ data={}; renderForm(); scheduleSave(); }
  });

  $("#saveState").textContent="Prêt";
}
document.addEventListener("DOMContentLoaded",init);
</script>
