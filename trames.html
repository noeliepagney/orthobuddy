    (cab.certifs?"<p style='margin:0;font-style:italic'>"+esc(cab.certifs)+"</p>":"")+"</div>";
  let right="<div style='font-size:12px;text-align:right;line-height:1.45;color:"+C.ink+"'>"+
    (dest?"<p style='margin:0'>Destinataire : <b>"+dest+"</b></p>":"")+
    (copies?"<p style='margin:0'>Copies : "+copies+"</p>":"")+"</div>";
  const header="<table width='100%' cellpadding='0' cellspacing='0'><tr>"+
    "<td style='vertical-align:top;width:55%'>"+left+"</td><td style='vertical-align:top'>"+right+"</td></tr></table>";

  // Bandeau-titre
  const titleBanner="<table width='100%' cellspacing='0' cellpadding='0' style='border-collapse:collapse;margin:16px 0'><tr><td bgcolor='"+C.brique+"' style='background:"+C.brique+";padding:11px 16px;text-align:center'>"+
    "<p style='margin:0;color:#fff;font-weight:bold;font-size:15px;letter-spacing:.03em;text-transform:uppercase;line-height:1.25'>"+esc(t.docTitle||t.titre)+"</p>"+
    "<p style='margin:4px 0 0;color:#fff;font-size:11px;line-height:1.2'>Confidentiel et soumis au secret médical</p></td></tr></table>";

  const subline="<p style='text-align:center;font-style:italic;font-size:12px;color:"+C.inkSoft+";margin:8px 0 14px'>"+
    "Bilan réalisé par "+(prat||"…")+(statut?", "+statut:"")+(dateBilan?" — "+dateBilan:"")+"</p>";

  // Bloc patient
  const patRight="Patient <b>"+(nom||"")+" "+(prenom||"")+"</b>"+(ddn?", né(e) le "+ddn:"")+(secu?"<br>Assuré n° "+secu:"")+(adr?"<br>"+adr:"");
  const patient="<table width='100%' cellpadding='0' cellspacing='0' bgcolor='"+C.creme+"' style='background:"+C.creme+";border:1px solid "+C.border+"'><tr>"+
    "<td style='vertical-align:top;padding:9px 12px;font-size:12.5px'><p style='margin:0;line-height:1.4'>"+(dateBilan?"Date du bilan : "+dateBilan:"")+"</p></td>"+
    "<td style='vertical-align:top;padding:9px 12px;font-size:12.5px;text-align:right'><p style='margin:0;line-height:1.4'>"+patRight+"</p></td></tr></table>";

  // Sections
  let body="";
  t.sections.forEach(sec=>{
    if(sec.meta) return;
    const blocks=[];
    sec.champs.forEach(c=>{
      if(c.type==="note") return;
      if(c.inHeader) return;
      if(c.type==="subhead"){ blocks.push({sub:c.text,items:[]}); return; }
      const v=fmtValue(c,val(sec.id,c.id)); if(v==="") return;
      const line="<p style='margin:4px 0;font-size:13px;line-height:1.5'><b style='color:"+C.sage+"'>"+esc(c.label)+" :</b> "+nl(v)+"</p>";
      if(blocks.length && blocks[blocks.length-1].sub!==undefined) blocks[blocks.length-1].items.push(line);
      else blocks.push({line});
    });
    let inner="";
    blocks.forEach(b=>{
      if(b.sub!==undefined){ if(b.items.length){ inner+="<p style='margin:11px 0 2px;font-weight:bold;color:"+C.brique+";text-transform:uppercase;font-size:11px;letter-spacing:.03em'>"+esc(b.sub)+"</p>"+b.items.join(""); } }
      else inner+=b.line;
    });
    if(inner.trim()!=="") body+=banner(sec.titre,C.sage)+inner;
  });

  const signature="<div style='margin-top:30px;font-size:13px'>"+
    "<p style='margin:0 0 22px'>Je reste à votre disposition pour tout renseignement complémentaire.<br>Cordialement,</p>"+
    "<p style='margin:0;font-weight:bold'>"+(prat||"[Nom du praticien]")+"</p>"+
    "<p style='margin:2px 0 0;color:#777'>"+statut+"</p></div>";

  const note=(!body)? "<p style='color:#999'>Aucune donnée saisie pour le moment.</p>":"";

  return header+titleBanner+subline+patient+(body||note)+signature;
}

/* ---------- Aperçu & PDF ------------------------------------------------ */
function getExportFilename(ext){
  const t=TRAMES[trameId];
  const sel=$("#patientSel");
  const opt=sel&&sel.options[sel.selectedIndex];
  const patientName=opt&&opt.text.trim()||"patient";
  const date=data[trameId+".entete.date_bilan"]||data[trameId+".administratif.date_bilan"]||new Date().toISOString().slice(0,10);
  return slug(patientName)+"_"+slug(t?t.titre:"bilan")+"_"+date+"."+ext;
}

  const patient=(()=>{ const sel=$("#patientSel"); if(!sel) return "patient"; const opt=sel.options[sel.selectedIndex]; return opt&&opt.text.trim()||"patient"; })();
  const filename=getExportFilename("pdf");
  const css=
    "*{box-sizing:border-box} "+

    ".toolbar .lbl{margin-right:auto;font-weight:700;color:"+C.inkSoft+";font-size:13px} "+
    ".toolbar button{font-family:inherit;font-weight:700;border:1px solid "+C.border+";background:#fff;border-radius:9px;padding:10px 16px;cursor:pointer;font-size:14px} "+
    ".toolbar .pdf{background:"+C.brique+";color:#fff;border-color:"+C.brique+"} "+
    "#page{max-width:820px;margin:20px auto 40px;background:#fff;padding:32px 34px;box-shadow:0 2px 18px rgba(0,0,0,.12)} "+
    ".pf{margin-top:26px;border-top:1px solid "+C.border+";padding-top:6px;font-size:9.5px;color:#9a9486;display:flex;justify-content:space-between} "+
    "table{border-collapse:collapse} tr,table,.banner-table{page-break-inside:avoid}";
  const inner=
    "<div class='toolbar'>"+
      "<span class='lbl'>Aperçu du compte rendu</span>"+
      "<button class='pdf' id='btnDl'>Télécharger le PDF</button>"+
      "<button onclick='window.close()'>Fermer</button>"+
    "</div>"+
    "<div id='page'><div id='doc'>"+buildDocBody()+
      "<div class='pf'><span>Document confidentiel &mdash; soumis au secret m&eacute;dical</span><span>G&eacute;n&eacute;r&eacute; avec OrthoBuddy</span></div>"+
    "</div></div>";
  const js=
    "function dl(){var el=document.getElementById('doc');"+
    "if(typeof html2pdf==='undefined'){alert('La librairie PDF est encore en cours de chargement, réessaie dans une seconde.');return;}"+
    "var b=document.getElementById('btnDl');b.disabled=true;b.textContent='Génération…';"+
    "var opt={margin:[12,12,14,12],filename:"+JSON.stringify(filename)+",image:{type:'jpeg',quality:0.98},"+
    "html2canvas:{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false},"+
    "jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['tr','table']}};"+
    "var ready=(document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();"+
    "ready.then(function(){return html2pdf().set(opt).from(el).save();}).then(function(){b.disabled=false;b.textContent='Télécharger le PDF';})"+
    ".catch(function(e){b.disabled=false;b.textContent='Télécharger le PDF';alert('Erreur lors de la génération du PDF : '+e);});}"+
    "document.getElementById('btnDl').addEventListener('click',dl);";
  const html="<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'><title>"+esc(t.docTitle||t.titre)+"</title>"+
    "<link href='https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap' rel='stylesheet'>"+
    "<script src='https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js'><\/script>"+
    "<style>"+css+"</style></head><body>"+inner+

    "</body></html>";
  const w=window.open("","_blank");
  if(!w){ alert("Le navigateur a bloqué la fenêtre. Autorisez les pop-up pour ce site."); return; }

/* ---------- Export Word (.doc) ------------------------------------------ */
function exportWord(){
  const t=TRAMES[trameId];
  const patient=(()=>{ const sel=$("#patientSel"); if(!sel) return "patient"; const opt=sel.options[sel.selectedIndex]; return opt&&opt.text.trim()||"patient"; })();
  const wordHtml="<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>"+
    "<head><meta charset='utf-8'><title>"+esc(t.docTitle||t.titre)+"</title>"+
    "<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->"+
    "<style>@page WordSection1{size:21cm 29.7cm;margin:1.6cm 1.8cm}div.WordSection1{page:WordSection1}"+
    "body{font-family:'Calibri','Segoe UI',sans-serif;color:"+C.ink+";font-size:11pt;line-height:1.35}"+
    "p{margin:0 0 3pt;mso-line-height-rule:exactly} td p{margin:0} table{border-collapse:collapse}</style></head><body><div class='WordSection1'>"+
    buildDocBody()+
    "<p style='margin-top:26px;font-size:8.5pt;color:#9a9486;border-top:1px solid "+C.border+";padding-top:6px'>Document confidentiel — soumis au secret médical · Généré avec OrthoBuddy</p>"+
    "</div></body></html>";
  const blob=new Blob(["\ufeff"+wordHtml],{type:"application/msword"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=getExportFilename("doc");
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },1500);
}

/* ---------- Modal cabinet ----------------------------------------------- */
function fillCabFields(c){ c=c||{}; CABFIELDS.forEach(f=>{ $("#cab_"+f).value=c[f]||""; }); if(!c.statut) $("#cab_statut").value="Orthophoniste"; }
function readCabFields(){ const c={}; CABFIELDS.forEach(f=>{ c[f]=$("#cab_"+f).value.trim(); }); return c; }
function refreshProfileSelect(selectName){
  const profs=getProfiles(), sel=$("#cab_profileSel"); sel.innerHTML="";
  Object.keys(profs).forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; sel.appendChild(o); });
  const nw=document.createElement("option"); nw.value="__new__"; nw.textContent="+ Nouveau profil"; sel.appendChild(nw);
  if(selectName!==undefined && selectName!==null) sel.value=selectName;
}
function loadProfileIntoForm(name){
  const profs=getProfiles();
  if(name==="__new__" || !profs[name]){ fillCabFields({}); $("#cab_profileName").value=""; }
  else { fillCabFields(profs[name]); $("#cab_profileName").value=name; }
}
function openCabinet(){
  migrateProfiles();
  const profs=getProfiles(), active=getActiveName();
  const start=(active && profs[active]) ? active : (Object.keys(profs)[0] || "__new__");
  refreshProfileSelect(start);
  loadProfileIntoForm(start);
  $("#overlay").classList.add("open");
}
function closeCabinet(){ $("#overlay").classList.remove("open"); }
function saveCabinet(){
  const c=readCabFields();
  let name=$("#cab_profileName").value.trim();
  if(!name) name=c.cabinet||"Mon cabinet";
  const profs=getProfiles(); profs[name]=c; setProfiles(profs); setActiveName(name);
  closeCabinet();
}
function deleteProfile(){
  const cur=$("#cab_profileSel").value, profs=getProfiles();
  if(cur==="__new__" || !profs[cur]){ closeCabinet(); return; }
  if(!confirm("Supprimer le profil « "+cur+" » ?")) return;
  delete profs[cur]; setProfiles(profs);
  const next=Object.keys(profs)[0]||"";
  setActiveName(next);
  refreshProfileSelect(next||"__new__");
  loadProfileIntoForm(next||"__new__");
}

/* ---------- Init -------------------------------------------------------- */
function init(){
  migrateProfiles();
  // Peupler le sélecteur de trames
  fillCategories();
  $("#catSel").value="Enfant"; fillSub("Enfant");
  selectFromSub();
  $("#saveState").textContent="Chargement…";

  loadPatients();

  $("#catSel").addEventListener("change",()=>{ fillSub($("#catSel").value); selectFromSub(); });
  $("#subSel").addEventListener("change",selectFromSub);
  $("#patientSel").addEventListener("change",onPatientChange);

  const savedSelEl=$("#savedSel");
  if(savedSelEl) savedSelEl.addEventListener("change",e=>{
    const k=e.target.value;
    const del=$("#btnDeleteSaved"); if(del) del.disabled=!k;
    if(k) openSaved(k);
  });

  const delBtn=$("#btnDeleteSaved");
  if(delBtn) delBtn.addEventListener("click",()=>{
    const k=$("#savedSel")?$("#savedSel").value:"";
    if(!k) return;
    if(!confirm("Supprimer définitivement ce bilan ?\nCette action est irréversible.")) return;
    deleteSaved(k);
  });

  $("#btnRenew").addEventListener("click",renewBilan);
  $("#btnBackup").addEventListener("click",exportBackup);
  $("#btnImport").addEventListener("click",()=>$("#importFile").click());
  $("#importFile").addEventListener("change",e=>{ const f=e.target.files[0]; if(f) importBackup(f); e.target.value=""; });
  $("#btnPdf").addEventListener("click",exportPDF);
  $("#btnWord").addEventListener("click",exportWord);
  $("#btnSettings").addEventListener("click",openCabinet);
  $("#cabSave").addEventListener("click",saveCabinet);
  $("#cabCancel").addEventListener("click",closeCabinet);
  $("#cabDelete").addEventListener("click",deleteProfile);
  $("#cab_profileSel").addEventListener("change",e=>{ loadProfileIntoForm(e.target.value); if(e.target.value==="__new__") $("#cab_profileName").focus(); });
  $("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeCabinet(); });

  $("#btnReset").addEventListener("click",()=>{
    if(!trameId||!currentPatientId) return;
    if(confirm("Effacer toutes les données saisies pour ce bilan ?")){ data={}; renderForm(); scheduleSave(); }
  });

  $("#saveState").textContent="Prêt";
}
document.addEventListener("DOMContentLoaded",init);
</script>
